name: uno_family
description: "UNO FAMILY — child-safe online card game (Android, iOS, Web)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  audioplayers: ^6.7.1
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.9.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/sfx/
